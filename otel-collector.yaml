receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

  resource:
    attributes:
      - key: deployment.environment
        value: ${env:DEPLOY_ENV}
        action: upsert

  batch:
    send_batch_size: 512
    timeout: 5s

exporters:
  debug:
    verbosity: detailed

  otlphttp/betterstack:
    endpoint: ${env:BS_INGEST_HOST}
    headers:
      Authorization: "Bearer ${env:BS_TOKEN}"
    sending_queue:
      enabled: true
      queue_size: 5000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m

  otlphttp/posthog:
    logs_endpoint: ${env:POSTHOG_HOST}/i/v1/logs
    headers:
      Authorization: "Bearer ${env:POSTHOG_KEY}"
    sending_queue:
      enabled: true
      queue_size: 5000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug, otlphttp/betterstack, otlphttp/posthog]

  telemetry:
    metrics:
      address: 0.0.0.0:8888
