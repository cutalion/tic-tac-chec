services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  ssh:
    build:
      context: .
      dockerfile: Dockerfile.ssh
    env_file:
      - .env
    ports:
      - "2222:2222"
    volumes:
      - ssh-keys:/app/.ssh
    mem_limit: 64m
    mem_reservation: 32m
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file:
      - .env
    mem_limit: 64m
    mem_reservation: 32m
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  ssh-keys:
