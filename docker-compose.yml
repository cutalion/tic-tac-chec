services:
  caddy:
    image: ghcr.io/cutalion/tic-tac-chec-caddy:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  ssh:
    image: ghcr.io/cutalion/tic-tac-chec-ssh:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.ssh
    env_file:
      - .env
    ports:
      - "2222:2222"
    volumes:
      - ssh-keys:/app/.ssh
    mem_limit: 64m
    mem_reservation: 32m
    restart: unless-stopped

  web:
    image: ghcr.io/cutalion/tic-tac-chec-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file:
      - .env
    environment:
      - DB_PATH=/data/ttc.db
    volumes:
      - ./bot/models:/app/bot/models:ro
      - ttc-db:/data
    mem_limit: 256m
    mem_reservation: 128m
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  ssh-keys:
  ttc-db:
