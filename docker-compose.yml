services:
  caddy:
    image: ghcr.io/cutalion/tic-tac-chec-caddy:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  ssh:
    image: ghcr.io/cutalion/tic-tac-chec-ssh:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.ssh
    env_file:
      - .env
    ports:
      - "2222:2222"
    volumes:
      - ssh-keys:/app/.ssh
    mem_limit: 64m
    mem_reservation: 32m
    restart: unless-stopped

  web:
    image: ghcr.io/cutalion/tic-tac-chec-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file:
      - .env
    environment:
      - DB_PATH=/data/ttc.db
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=ttc-web
    volumes:
      - ./bot/models:/app/bot/models:ro
      - ttc-db:/data
    mem_limit: 256m
    mem_reservation: 128m
    depends_on:
      - otel-collector
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    command: ["--config=/etc/otelcol/config.yaml"]
    env_file:
      - .env
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro
    # No host port mapping. The web container reaches the collector via the
    # compose network (otel-collector:4318); the host doesn't need access in
    # production. For local dev (running `air` outside compose), uncomment
    # ports in docker-compose.override.yml — see docker-compose.override.yml.example.
    mem_limit: 128m
    mem_reservation: 64m
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  ssh-keys:
  ttc-db:
